<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/estilos.css">
    <link rel="icon" href="imagenes/7.png" type="image/x-icon">
    <title>Cuestionario de Inscripción</title>
</head>

<body>
    <header class="cabecera-sitio">
        <div class="contenedor interior-cabecera">
            <div class="marca">
                <a class="logo-enlace" href="index.html">
                    <img src="imagenes/logosv_final.png" alt="Logo Seven Sport">
                </a>
                <div class="marca-texto">
                    <h1><a class="marca-enlace" href="index.html">Seven Sport</a></h1>
                    <p>Potencia tu energía. Vive el entrenamiento.</p>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html#inicio">Inicio</a></li>
                    <li><a href="index.html#servicios">Servicios</a></li>
                    <li><a href="index.html#tarifas">Tarifas</a></li>
                    <li><a href="index.html#faq">FAQ</a></li>
                    <li><a href="index.html#politicas">Políticas</a></li>
                    <li><a href="cuestionario.html">¡Únete ya!</a></li>
                </ul>
            </nav>
        </div>
    </header>
<div class="contenedor">

    <h1>Cuestionario de Inscripción</h1>

    <form>

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad" min="14" max="100" required>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" required>

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" required>

        <label>¿Cuál es tu objetivo?</label>

        <div class="radio-group">
            <label><input type="radio" name="objetivo" value="Perder peso">Perder peso</label>
            <label><input type="radio" name="objetivo" value="Ganar músculo">Ganar músculo</label>
            <label><input type="radio" name="objetivo" value="Mantenerse en forma">Mantenerse en forma</label>
            <label><input type="radio" name="objetivo" value="Aumentar fuerza">Aumentar fuerza</label>
            <label><input type="radio" name="objetivo" value="Mejorar resistencia">Mejorar resistencia</label>
            <label><input type="radio" name="objetivo" value="Preparar competición">Preparar competición</label>
            <label><input type="radio" name="objetivo" value="Rehabilitación">Rehabilitación</label>
            <label><input type="radio" name="objetivo" value="Mejorar salud">Mejorar salud</label>
        </div>

        <label for="nivel">Nivel de experiencia</label>

        <select id="nivel" name="nivel" onchange="mostrarBarra()">
            <option value="">-- Selecciona un nivel --</option>
            <option value="Principiante">Principiante</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Avanzado">Avanzado</option>
        </select>

        <div id="barraExperiencia">

            <label for="experiencia">
                Valora tu experiencia:
                <span id="valorExperiencia">5</span>/10
            </label>

            <input
                type="range"
                id="experiencia"
                name="experiencia"
                min="0"
                max="10"
                value="5"
                oninput="document.getElementById('valorExperiencia').textContent=this.value">

        </div>

        <label>¿Qué días puedes entrenar?</label>

        <div class="checkbox-group">
            <label><input type="checkbox" name="dias" value="Lunes">Lunes</label>
            <label><input type="checkbox" name="dias" value="Martes">Martes</label>
            <label><input type="checkbox" name="dias" value="Miércoles">Miércoles</label>
            <label><input type="checkbox" name="dias" value="Jueves">Jueves</label>
            <label><input type="checkbox" name="dias" value="Viernes">Viernes</label>
            <label><input type="checkbox" name="dias" value="Sábado">Sábado</label>
        </div>

        <label>¿En qué horario prefieres entrenar?</label>

        <div class="radio-group">
            <label><input type="radio" name="horario" value="Mañana">Mañana</label>
            <label><input type="radio" name="horario" value="Tarde">Tarde</label>
        </div>

        <label for="salud">¿Tienes alguna lesión o enfermedad?</label>

        <textarea
            id="salud"
            name="salud"
            rows="4"
            placeholder="Describe cualquier lesión o condición médica..."></textarea>

        <label for="comentarios">Comentarios o información adicional</label>

        <textarea
            id="comentarios"
            name="comentarios"
            rows="4"
            placeholder="Escribe aquí cualquier información extra que quieras compartir (objetivos, horarios, dudas, etc.)"></textarea>

        <button type="submit">Enviar cuestionario</button>

    </form>

</div>
<h3 class="titulo-seccion">Síguenos en redes sociales</h3>
    <div class="redes-sociales">
            <a href="https://www.facebook.com/p/Seven-Sport-100051161697094/"><img src="imagenes/fb.png" alt="Facebook">Facebook</a>
            <a href="https://x.com/SevenSport1"><img src="imagenes/x.png" alt="Twitter">Twitter</a>
            <a href="https://www.instagram.com/sevensportgym/"><img src="imagenes/ig.png" alt="Instagram">Instagram</a>
        </div>
    <footer class="pie-sitio">
        <div class="contenedor interior-pie">
            <p>Seven Sport © 2026 · 2WEB Project</p>
        </div>
        
    </footer>
        

<script>
    function mostrarBarra() {

        const nivel = document.getElementById("nivel").value;
        const barra = document.getElementById("barraExperiencia");

        if (nivel === "") {
            barra.style.display = "none";
        } else {
            barra.style.display = "block";
        }
    }
</script>

</body>
</html>
